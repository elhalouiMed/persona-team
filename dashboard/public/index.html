<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="color-scheme" content="dark" />
<title>Persona Team · Live</title>
<style>
  :root{
    --bg:#05070d; --bg2:#070a13;
    --panel:rgba(255,255,255,.04); --panel-2:rgba(255,255,255,.025);
    --line:rgba(255,255,255,.09); --line-soft:rgba(255,255,255,.06);
    --txt:#eef3fb;
    /* muted bumped to clear WCAG AA (4.5:1) on the dark bg */
    --muted:#9aa7c2; --muted-2:#aeb9d2;
    --cyan:#34dbf0; --mag:#e07bf5; --violet:#a78bfa;
    --green:#46e0a8; --amber:#ffcb45; --red:#ff7d92;
    --mono:ui-monospace,'SF Mono','JetBrains Mono',Menlo,Consolas,'Liberation Mono',monospace;
    --sans:system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    --radius:16px;
    --grad:linear-gradient(100deg,var(--cyan),var(--violet) 55%,var(--mag));
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:
      radial-gradient(1300px 680px at 12% -12%, rgba(52,219,240,.12), transparent 58%),
      radial-gradient(1100px 560px at 102% -4%, rgba(224,123,245,.11), transparent 55%),
      radial-gradient(900px 700px at 50% 120%, rgba(167,139,250,.07), transparent 60%),
      linear-gradient(180deg,var(--bg),var(--bg2));
    color:var(--txt); font-family:var(--sans);
    min-height:100%; overflow-x:hidden; position:relative;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  }
  /* breathing grid */
  body::before{
    content:""; position:fixed; inset:-2px; z-index:0; pointer-events:none;
    background-image:linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px),
                     linear-gradient(90deg,rgba(255,255,255,.035) 1px,transparent 1px);
    background-size:48px 48px;
    mask-image:radial-gradient(circle at 50% 22%,#000 0%,transparent 78%);
    -webkit-mask-image:radial-gradient(circle at 50% 22%,#000 0%,transparent 78%);
    animation:drift 26s linear infinite;
  }
  /* soft aurora wash behind everything */
  body::after{
    content:""; position:fixed; inset:0; z-index:0; pointer-events:none; opacity:.5;
    background:
      radial-gradient(620px 320px at 78% 8%, rgba(224,123,245,.10), transparent 70%),
      radial-gradient(520px 300px at 6% 18%, rgba(52,219,240,.10), transparent 70%);
    animation:float 18s ease-in-out infinite alternate;
  }
  @keyframes drift{from{background-position:0 0,0 0}to{background-position:48px 48px,48px 48px}}
  @keyframes float{from{transform:translate3d(0,0,0)}to{transform:translate3d(0,-14px,0)}}
  .wrap{position:relative; z-index:1; max-width:1520px; margin:0 auto; padding:26px 28px 48px}

  /* ── header ── */
  header{display:flex; align-items:center; gap:18px; flex-wrap:wrap; margin-bottom:20px}
  .brand{display:flex; align-items:center; gap:12px}
  .mark{width:34px;height:34px;border-radius:11px; flex:none; position:relative; display:grid; place-items:center;
    background:linear-gradient(150deg,rgba(52,219,240,.22),rgba(224,123,245,.22));
    border:1px solid rgba(255,255,255,.14); box-shadow:0 0 22px rgba(52,219,240,.18) inset;}
  .mark .orb{width:12px;height:12px;border-radius:50%;background:var(--cyan);
    box-shadow:0 0 12px var(--cyan),0 0 30px var(--cyan); animation:beat 1.6s ease-in-out infinite}
  .mark .ring{position:absolute; inset:-1px; border-radius:12px; border:1px solid rgba(52,219,240,.4);
    animation:halo 2.6s ease-out infinite}
  @keyframes halo{0%{transform:scale(1);opacity:.6}100%{transform:scale(1.5);opacity:0}}
  .wordmark{font-family:var(--mono); font-weight:700; letter-spacing:.30em; font-size:13px;
    background:var(--grad); -webkit-background-clip:text; background-clip:text; color:transparent;
    line-height:1; white-space:nowrap}
  .wordmark .sub{display:block; -webkit-text-fill-color:var(--muted); color:var(--muted);
    font-weight:500; letter-spacing:.24em; font-size:8.5px; margin-top:5px; -webkit-background-clip:initial; background:none}
  @keyframes beat{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.32);opacity:.62}}

  .task{flex:1; min-width:240px; font-size:15px; color:var(--txt); font-weight:500; line-height:1.4}
  .task small{display:block; color:var(--muted); font-family:var(--mono); font-size:10.5px; letter-spacing:.1em; margin-top:4px; text-transform:uppercase}
  .pill{font-family:var(--mono); font-size:10.5px; letter-spacing:.18em; text-transform:uppercase;
    padding:7px 13px; border-radius:999px; border:1px solid var(--line); display:flex; align-items:center; gap:8px; background:var(--panel-2)}
  .pill .dot{width:7px;height:7px;border-radius:50%;background:var(--muted)}
  .pill.running{color:var(--cyan);border-color:rgba(52,219,240,.42);background:rgba(52,219,240,.07)}
  .pill.running .dot{background:var(--cyan);box-shadow:0 0 10px var(--cyan);animation:beat 1.2s infinite}
  .pill.complete{color:var(--green);border-color:rgba(70,224,168,.42);background:rgba(70,224,168,.07)}
  .pill.complete .dot{background:var(--green);box-shadow:0 0 10px var(--green)}
  .pill.idle{color:var(--muted-2)}
  .conn{font-family:var(--mono);font-size:10px;color:var(--muted);display:flex;align-items:center;gap:7px;
    padding:7px 12px;border-radius:999px;border:1px solid var(--line);background:var(--panel-2);text-transform:uppercase;letter-spacing:.14em}
  .conn .dot{width:7px;height:7px;border-radius:50%;background:var(--red);box-shadow:0 0 8px rgba(255,125,146,.6)}
  .conn.live .dot{background:var(--green);box-shadow:0 0 9px var(--green);animation:beat 1.6s infinite}
  .conn.connecting .dot{background:var(--amber);box-shadow:0 0 9px var(--amber);animation:beat 1s infinite}

  /* ── stats ── */
  .stats{display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:24px}
  .stat{position:relative; background:linear-gradient(160deg,var(--panel),var(--panel-2));
    border:1px solid var(--line); border-radius:var(--radius); padding:18px 18px 16px; backdrop-filter:blur(10px); overflow:hidden}
  .stat::before{content:""; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--muted); opacity:.5}
  .stat .n{font-family:var(--mono); font-size:38px; font-weight:600; line-height:1; font-variant-numeric:tabular-nums; letter-spacing:-.01em}
  .stat .l{font-size:10.5px; letter-spacing:.18em; text-transform:uppercase; color:var(--muted-2); margin-top:10px; display:flex; align-items:center; gap:7px}
  .stat .l .dt{width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.85}
  .stat.total .n{color:var(--txt)} .stat.total::before{background:linear-gradient(var(--cyan),var(--mag))}
  .stat.work .n{color:var(--cyan)} .stat.work::before{background:var(--cyan); box-shadow:0 0 18px var(--cyan)} .stat.work .l{color:var(--cyan)}
  .stat.wait .n{color:var(--amber)} .stat.wait::before{background:var(--amber)} .stat.wait .l{color:var(--amber)}
  .stat.done .n{color:var(--green)} .stat.done::before{background:var(--green)} .stat.done .l{color:var(--green)}
  .stat.work::after{content:""; position:absolute; inset:0; pointer-events:none;
    background:radial-gradient(120px 80px at 100% 0%, rgba(52,219,240,.14), transparent 70%)}

  /* ── pipeline ── */
  .board{display:flex; gap:18px; overflow-x:auto; padding-bottom:16px; align-items:flex-start; scroll-snap-type:x proximity}
  .col{flex:0 0 286px; display:flex; flex-direction:column; gap:13px; scroll-snap-align:start}
  .col-head{display:flex; align-items:center; gap:9px;
    font-family:var(--mono); font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--muted-2);
    padding:10px 14px; border-radius:12px; border:1px solid var(--line); background:var(--panel-2)}
  .col-head .pdot{width:8px;height:8px;border-radius:50%;background:var(--muted); flex:none}
  .col-head .nm{flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .col-head .ct{font-size:10px; letter-spacing:.08em; color:var(--muted); background:rgba(255,255,255,.06);
    border:1px solid var(--line-soft); border-radius:999px; padding:2px 8px; flex:none}
  .col-head.active{color:var(--cyan); border-color:rgba(52,219,240,.4); background:rgba(52,219,240,.07);
    box-shadow:0 0 0 1px rgba(52,219,240,.18),0 0 26px rgba(52,219,240,.10)}
  .col-head.active .pdot{background:var(--cyan);box-shadow:0 0 10px var(--cyan);animation:beat 1.3s infinite}
  .col-head.active .ct{color:var(--cyan); border-color:rgba(52,219,240,.35); background:rgba(52,219,240,.10)}
  .col-head.done{color:var(--green); border-color:rgba(70,224,168,.3)}
  .col-head.done .pdot{background:var(--green); box-shadow:0 0 8px rgba(70,224,168,.6)}

  .card{position:relative; background:linear-gradient(160deg,var(--panel),var(--panel-2));
    border:1px solid var(--line); border-radius:var(--radius);
    padding:15px; backdrop-filter:blur(10px); transition:transform .3s, box-shadow .3s, border-color .3s; overflow:hidden}
  .card .row{display:flex; align-items:flex-start; gap:12px}
  .ico{width:42px;height:42px;border-radius:12px; display:grid; place-items:center; font-size:21px;
    background:rgba(255,255,255,.05); border:1px solid var(--line); flex:none; position:relative}
  .nmw{min-width:0; flex:1}
  .nm{font-weight:600; font-size:14.5px; letter-spacing:-.01em; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .rl{font-size:11.5px; color:var(--muted-2); margin-top:3px; line-height:1.4}
  .badge{font-family:var(--mono); font-size:9.5px; letter-spacing:.12em; text-transform:uppercase;
    padding:5px 9px; border-radius:8px; border:1px solid var(--line); color:var(--muted-2); white-space:nowrap; flex:none; align-self:flex-start}
  .note{margin-top:12px; font-size:11.5px; color:var(--muted-2); font-family:var(--mono); line-height:1.5;
    border-top:1px dashed var(--line); padding-top:10px; word-break:break-word}
  .timer{margin-top:11px; font-family:var(--mono); font-size:11.5px; color:var(--cyan); display:flex; align-items:center; gap:8px; font-variant-numeric:tabular-nums}
  .timer .chk{color:var(--green); font-weight:700}

  /* status styling */
  .card.waiting{opacity:.66; border-style:dashed}
  .card.waiting .badge{color:var(--amber);border-color:rgba(255,203,69,.35);background:rgba(255,203,69,.05)}
  .card.working{border-color:rgba(52,219,240,.5); box-shadow:0 0 0 1px rgba(52,219,240,.22),0 0 36px rgba(52,219,240,.16); transform:translateY(-1px)}
  /* sweeping shimmer across working cards */
  .card.working::after{content:"";position:absolute;inset:0;border-radius:var(--radius);pointer-events:none;
    background:linear-gradient(120deg,transparent 28%,rgba(52,219,240,.14),transparent 68%);
    background-size:220% 100%; animation:sweep 2.6s linear infinite}
  /* thin progress bar feel at the bottom of working cards */
  .card.working::before{content:"";position:absolute;left:0;right:0;bottom:0;height:2px;pointer-events:none;
    background:linear-gradient(90deg,transparent,var(--cyan),var(--violet),transparent);
    background-size:200% 100%; animation:progress 1.9s linear infinite; opacity:.9}
  @keyframes sweep{from{background-position:200% 0}to{background-position:-60% 0}}
  @keyframes progress{from{background-position:0% 0}to{background-position:200% 0}}
  .card.working .badge{color:var(--cyan);border-color:rgba(52,219,240,.5);background:rgba(52,219,240,.10)}
  .card.working .ico{animation:beat 1.8s ease-in-out infinite; box-shadow:0 0 18px rgba(52,219,240,.18)}
  .card.done{border-color:rgba(70,224,168,.32)}
  .card.done .ico{background:rgba(70,224,168,.06); border-color:rgba(70,224,168,.22)}
  .card.done .badge{color:var(--green);border-color:rgba(70,224,168,.4);background:rgba(70,224,168,.08)}
  .card.done .timer{color:var(--green)}
  .card.blocked{border-color:rgba(255,125,146,.5); box-shadow:0 0 26px rgba(255,125,146,.10)}
  .card.blocked .badge{color:var(--red);border-color:rgba(255,125,146,.5);background:rgba(255,125,146,.10)}
  .card.blocked .ico{animation:shake 1.4s ease-in-out infinite}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-1.5px)}75%{transform:translateX(1.5px)}}

  .card-empty{border-style:dashed; opacity:.5; text-align:center; padding:22px 14px; color:var(--muted)}
  .card-empty .dash{font-family:var(--mono); font-size:11px; letter-spacing:.14em}

  .spinner{width:12px;height:12px;border-radius:50%;border:2px solid rgba(52,219,240,.25);border-top-color:var(--cyan);animation:spin .8s linear infinite; flex:none}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ── log ── */
  .log{margin-top:28px; background:linear-gradient(160deg,var(--panel),var(--panel-2)); border:1px solid var(--line); border-radius:var(--radius); padding:16px 18px; backdrop-filter:blur(10px)}
  .log h3{margin:0 0 12px; font-family:var(--mono); font-size:10.5px; letter-spacing:.22em; text-transform:uppercase; color:var(--muted-2); display:flex; align-items:center; gap:9px}
  .log h3 .lp{width:6px;height:6px;border-radius:50%;background:var(--cyan);box-shadow:0 0 9px var(--cyan);animation:beat 1.7s infinite}
  .feed{max-height:220px; overflow-y:auto; display:flex; flex-direction:column-reverse; gap:7px; font-family:var(--mono); font-size:11.5px}
  .li{color:var(--txt); opacity:.9; line-height:1.55; display:flex; gap:11px}
  .li .t{color:var(--muted); flex:none; font-variant-numeric:tabular-nums}
  .li .m{min-width:0; word-break:break-word}
  .feed .placeholder{color:var(--muted); opacity:.7}

  /* ── hero (idle / screenshot money-shot) ── */
  .hero{padding:46px 0 8px; text-align:center}
  .hero .badge-top{display:inline-flex; align-items:center; gap:9px; font-family:var(--mono); font-size:10px;
    letter-spacing:.22em; text-transform:uppercase; color:var(--muted-2);
    border:1px solid var(--line); background:var(--panel-2); padding:7px 14px; border-radius:999px; margin-bottom:26px}
  .hero .badge-top .dt{width:7px;height:7px;border-radius:50%;background:var(--cyan);box-shadow:0 0 10px var(--cyan);animation:beat 1.6s infinite}
  .hero h1{margin:0; font-size:clamp(46px,8vw,86px); line-height:.95; font-weight:800; letter-spacing:-.03em;
    background:var(--grad); -webkit-background-clip:text; background-clip:text; color:transparent;
    background-size:200% auto; animation:shift 9s ease-in-out infinite}
  @keyframes shift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
  .hero .vp{margin:20px auto 0; max-width:560px; font-size:17px; color:var(--muted-2); line-height:1.55}
  .hero .vp b{color:var(--txt); font-weight:600}
  .copychip{display:inline-flex; align-items:center; gap:0; margin:30px auto 6px; max-width:100%;
    border:1px solid var(--line); border-radius:12px; background:rgba(0,0,0,.32); overflow:hidden; backdrop-filter:blur(6px)}
  .copychip .cmd{font-family:var(--mono); font-size:12px; color:var(--cyan); padding:13px 16px; white-space:nowrap;
    overflow-x:auto; max-width:74vw; text-align:left}
  .copychip .cmd .pmt{color:var(--muted); user-select:none}
  .copychip button{font-family:var(--mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase;
    color:var(--txt); background:rgba(255,255,255,.06); border:none; border-left:1px solid var(--line);
    padding:13px 16px; cursor:pointer; transition:background .2s, color .2s; flex:none; align-self:stretch}
  .copychip button:hover{background:rgba(52,219,240,.16); color:var(--cyan)}
  .copychip button:focus-visible{outline:2px solid var(--cyan); outline-offset:-2px}
  .copychip button.copied{color:var(--green); background:rgba(70,224,168,.14)}
  .hero .hint{margin-top:10px; font-family:var(--mono); font-size:10.5px; letter-spacing:.12em; color:var(--muted); text-transform:uppercase}
  .hero .hint code{color:var(--cyan); background:rgba(52,219,240,.10); padding:2px 7px; border-radius:6px}

  /* ghost preview — dimmed phase board so empty still looks like a product */
  .ghost{margin-top:48px; position:relative; -webkit-mask-image:linear-gradient(180deg,#000 0%,#000 55%,transparent 100%);
    mask-image:linear-gradient(180deg,#000 0%,#000 55%,transparent 100%)}
  .ghost .ghost-label{font-family:var(--mono); font-size:9.5px; letter-spacing:.24em; text-transform:uppercase; color:var(--muted);
    text-align:center; opacity:.6; margin-bottom:16px}
  .ghost .gboard{display:flex; gap:18px; opacity:.4; pointer-events:none; filter:saturate(.7)}
  .ghost .gcol{flex:1; display:flex; flex-direction:column; gap:12px; min-width:0}
  .ghost .ghead{font-family:var(--mono); font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted);
    padding:9px 13px; border:1px solid var(--line); border-radius:11px; background:var(--panel-2); display:flex; align-items:center; gap:8px}
  .ghost .ghead .gd{width:7px;height:7px;border-radius:50%;background:var(--muted)}
  .ghost .ghead.gactive{color:var(--cyan); border-color:rgba(52,219,240,.3)}
  .ghost .ghead.gactive .gd{background:var(--cyan); box-shadow:0 0 8px var(--cyan)}
  .ghost .gcard{display:flex; align-items:center; gap:11px; padding:13px; border:1px solid var(--line); border-radius:13px; background:var(--panel-2)}
  .ghost .gico{width:36px;height:36px;border-radius:10px; display:grid; place-items:center; font-size:18px; opacity:.85;
    background:rgba(255,255,255,.05); border:1px solid var(--line); flex:none}
  .ghost .gtxt{flex:1; min-width:0}
  .ghost .gbar{height:8px; border-radius:6px; background:rgba(255,255,255,.10); width:70%}
  .ghost .gbar.s{height:6px; width:45%; margin-top:7px; background:rgba(255,255,255,.06)}

  ::-webkit-scrollbar{height:9px;width:9px}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.14);border-radius:9px}
  ::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.22)}
  ::-webkit-scrollbar-track{background:transparent}

  .visually-hidden{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0 0 0 0);border:0}

  /* responsive: stats 2-up below 1100px */
  @media (max-width:1100px){
    .stats{grid-template-columns:repeat(2,1fr)}
    .stat .n{font-size:32px}
    .ghost .gboard{flex-wrap:nowrap; overflow:hidden}
  }
  @media (max-width:600px){
    .wrap{padding:18px 16px 36px}
    .hero{padding:30px 0 6px}
  }

  /* reduced motion: kill all animation */
  @media (prefers-reduced-motion: reduce){
    *,*::before,*::after{animation:none !important; transition:none !important}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="mark"><span class="ring"></span><span class="orb"></span></div>
      <div class="wordmark">PERSONA&nbsp;TEAM<span class="sub">LIVE COMMAND CENTER</span></div>
    </div>
    <div class="task" id="task">Waiting for a run…<small id="runid">no active run</small></div>
    <div class="pill idle" id="pill"><span class="dot"></span><span id="pillTxt">idle</span></div>
    <div class="conn connecting" id="conn"><span class="dot"></span><span id="connTxt">connecting</span></div>
  </header>

  <div class="stats" id="stats" aria-live="polite" aria-label="Team status counters">
    <div class="stat total"><div class="n" id="sTotal">0</div><div class="l"><span class="dt"></span>Agents</div></div>
    <div class="stat work"><div class="n" id="sWork">0</div><div class="l"><span class="dt"></span>Working</div></div>
    <div class="stat wait"><div class="n" id="sWait">0</div><div class="l"><span class="dt"></span>Waiting</div></div>
    <div class="stat done"><div class="n" id="sDone">0</div><div class="l"><span class="dt"></span>Done</div></div>
  </div>

  <div id="stage"></div>

  <div class="log">
    <h3><span class="lp"></span>Activity Feed</h3>
    <div class="feed" id="feed" aria-live="polite" aria-label="Live activity log"></div>
  </div>
</div>

<script>
const ICONS = {
  'business-analyst':'📋','product-owner':'🧭','software-architect':'🏛️','team-lead':'🎯',
  'backend-senior':'⚙️','frontend-senior':'🎨','fullstack-senior':'🧩','devops-engineer':'🚀',
  'qa-test-senior':'🔬','senior-recruiter':'🧲'
};
const icon = id => ICONS[id] || '🤖';
const BADGE = {waiting:'queued',working:'working',done:'done',blocked:'blocked'};
const INSTALL = 'curl -fsSL https://raw.githubusercontent.com/YOUR_GITHUB_USERNAME/persona-team/main/install.sh | bash';
let S = null;

function fmt(ms){ if(ms<0)ms=0; const s=Math.floor(ms/1000); const m=Math.floor(s/60); return (m?m+'m ':'')+(s%60)+'s'; }
function dur(a){
  if(!a.startedAt) return '';
  const end = a.endedAt ? Date.parse(a.endedAt) : Date.now();
  return fmt(end - Date.parse(a.startedAt));
}
function esc(s){ return (s==null?'':String(s)).replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

/* count-up tween for the big counters (vanilla, no lib) */
const tweens = {};
function setCount(id, target){
  const el = document.getElementById(id);
  if(!el) return;
  const from = (tweens[id] != null) ? tweens[id] : (parseInt(el.textContent,10) || 0);
  tweens[id] = target;
  // Always commit the real value first so the DOM is correct even if no frame
  // ever fires (headless capture / no rAF / reduced motion). The tween then
  // animates *over* this final value purely as visual polish.
  el.textContent = target;
  if(from === target || typeof requestAnimationFrame !== 'function') return;
  cancelAnimationFrame(el._raf);
  const t0 = performance.now(), dur = 520;
  const step = (t)=>{
    const k = Math.min(1, (t - t0)/dur);
    const eased = 1 - Math.pow(1 - k, 3);            // easeOutCubic
    el.textContent = (k < 1) ? Math.round(from + (target - from) * eased) : target;
    if(k < 1) el._raf = requestAnimationFrame(step);
  };
  el._raf = requestAnimationFrame(step);
}

/* ── idle hero (screenshot money-shot) ── */
const GHOST = [
  {name:'Scope',   active:false, ids:['business-analyst','product-owner']},
  {name:'Design',  active:false, ids:['software-architect']},
  {name:'Build',   active:true,  ids:['frontend-senior','backend-senior','devops-engineer']},
  {name:'Test',    active:false, ids:['qa-test-senior']},
  {name:'Deliver', active:false, ids:['team-lead']},
];
function renderHero(){
  const stage = document.getElementById('stage');
  stage.className = '';
  stage.innerHTML = `
    <section class="hero">
      <div class="badge-top"><span class="dt"></span>Live multi-agent orchestration</div>
      <h1>PERSONA&nbsp;TEAM</h1>
      <p class="vp"><b>Spin up a senior team. Watch them ship — live.</b><br>
        A business analyst, architect, engineers, QA and a team lead — orchestrated in your terminal, streamed to this board.</p>
      <div class="copychip">
        <code class="cmd"><span class="pmt">$ </span><span id="cmdText">${esc(INSTALL)}</span></code>
        <button id="copyBtn" type="button" aria-label="Copy install command to clipboard">Copy</button>
      </div>
      <div class="hint">then run <code>/build-team &lt;your task&gt;</code> in Claude Code</div>

      <div class="ghost" aria-hidden="true">
        <div class="ghost-label">Phase board · preview</div>
        <div class="gboard">
          ${GHOST.map(g=>`
            <div class="gcol">
              <div class="ghead ${g.active?'gactive':''}"><span class="gd"></span>${esc(g.name)}</div>
              ${g.ids.map(id=>`
                <div class="gcard">
                  <div class="gico">${icon(id)}</div>
                  <div class="gtxt"><div class="gbar"></div><div class="gbar s"></div></div>
                </div>`).join('')}
            </div>`).join('')}
        </div>
      </div>
    </section>`;
  const btn = document.getElementById('copyBtn');
  if(btn && !btn._wired){
    btn._wired = true;
    btn.addEventListener('click', ()=>{
      const done = ()=>{ btn.textContent='Copied ✓'; btn.classList.add('copied');
        setTimeout(()=>{ btn.textContent='Copy'; btn.classList.remove('copied'); }, 1600); };
      if(navigator.clipboard && navigator.clipboard.writeText){
        navigator.clipboard.writeText(INSTALL).then(done).catch(fallbackCopy);
      } else fallbackCopy();
      function fallbackCopy(){
        const ta=document.createElement('textarea'); ta.value=INSTALL; ta.style.position='fixed'; ta.style.opacity='0';
        document.body.appendChild(ta); ta.select();
        try{ document.execCommand('copy'); done(); }catch(_){}
        document.body.removeChild(ta);
      }
    });
  }
}

function render(){
  if(!S) return;
  // header
  document.getElementById('task').childNodes[0].nodeValue = S.task || 'Waiting for a run…';
  document.getElementById('runid').textContent = S.runId ? ('run '+String(S.runId).slice(-6)) : 'no active run';
  const pill = document.getElementById('pill'), pillTxt = document.getElementById('pillTxt');
  pill.className = 'pill ' + (S.status||'idle'); pillTxt.textContent = S.status||'idle';

  const agents = (S.order||[]).map(id=>S.agents[id]).filter(Boolean);
  const c = {working:0,waiting:0,done:0};
  agents.forEach(a=>{ if(a.status==='working')c.working++; else if(a.status==='done')c.done++; else if(a.status!=='blocked')c.waiting++; });
  setCount('sTotal', agents.length);
  setCount('sWork', c.working);
  setCount('sWait', c.waiting);
  setCount('sDone', c.done);

  const stage = document.getElementById('stage');

  // idle / no team yet → designed hero with ghost preview
  if(!agents.length){ renderHero(); }
  else {
    // columns = declared phases ∪ agent-only phases (order preserved)
    const cols = [];
    (S.phases||[]).forEach(p=>cols.push({name:p.name,status:p.status}));
    agents.forEach(a=>{ const ph=a.phase||'Team'; if(!cols.find(x=>x.name===ph)) cols.push({name:ph,status:'pending'}); });
    if(!cols.length) cols.push({name:'Team',status:'pending'});

    stage.className='board';
    stage.innerHTML = cols.map(col=>{
      const inCol = agents.filter(a=>(a.phase||'Team')===col.name);
      const cards = inCol.map(a=>{
        const working = a.status==='working';
        const showTimer = !!a.startedAt;
        return `<div class="card ${a.status}">
          <div class="row">
            <div class="ico">${icon(a.id)}</div>
            <div class="nmw"><div class="nm">${esc(a.id)}</div><div class="rl">${esc(a.role)||'&nbsp;'}</div></div>
            <div class="badge">${esc(BADGE[a.status]||a.status)}</div>
          </div>
          ${a.note?`<div class="note">${esc(a.note)}</div>`:''}
          ${showTimer?`<div class="timer">${working?'<span class="spinner"></span>':'<span class="chk">✓</span>'}<span data-start="${esc(a.startedAt)}" data-end="${esc(a.endedAt||'')}">${esc(dur(a))}</span></div>`:''}
        </div>`;
      }).join('') || '<div class="card card-empty"><div class="dash">— awaiting agents —</div></div>';
      const headCls = col.status==='active'?'active':col.status==='done'?'done':'';
      return `<div class="col">
        <div class="col-head ${headCls}"><span class="pdot"></span><span class="nm">${esc(col.name)}</span><span class="ct">${inCol.length}</span></div>
        ${cards}
      </div>`;
    }).join('');
  }

  // log
  const feed = document.getElementById('feed');
  const logs = (S.logs||[]).slice(-80);
  feed.innerHTML = logs.length
    ? logs.map(l=>{
        const t = (l.ts||'').slice(11,19);
        return `<div class="li"><span class="t">${esc(t)}</span><span class="m">${esc(l.message)}</span></div>`;
      }).join('')
    : '<div class="li placeholder"><span class="m">Waiting for activity…</span></div>';
}

function tickTimers(){
  document.querySelectorAll('.timer span[data-start]').forEach(el=>{
    if(el.dataset.end) return; // finished
    el.textContent = fmt(Date.now() - Date.parse(el.dataset.start));
  });
}

function connect(){
  const es = new EventSource('/events');
  const conn = document.getElementById('conn'), connTxt = document.getElementById('connTxt');
  es.onopen = ()=>{ conn.className='conn live'; connTxt.textContent='live'; };
  es.onmessage = (e)=>{ try{ const m=JSON.parse(e.data); if(m.kind==='snapshot'){ S=m.state; render(); } }catch(_){} };
  es.onerror = ()=>{ conn.className='conn'; connTxt.textContent='reconnecting'; es.close(); setTimeout(connect,1500); };
}

// paint the hero immediately so the page never looks blank before first snapshot
renderHero();
connect();
setInterval(tickTimers,1000);
</script>
