<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Persona Team · Live</title>
<script>
  // set theme before paint (no flash). lightweight.
  try{ var t=localStorage.getItem('pt-theme'); if(t) document.documentElement.setAttribute('data-theme',t); }catch(e){}
</script>
<style>
  /* ===== Lightweight theme — no blur, no infinite bg animation ===== */
  :root[data-theme="light"]{
    --bg:#f5f6fa; --panel:#ffffff; --panel-2:#fbfcfe;
    --line:#e6e8f0; --line-2:#eef0f6;
    --txt:#1b2235; --muted:#6b7488; --muted-2:#8a92a6;
    --accent:#5b6cff; --accent-soft:#eef0ff;
    --green:#16a34a; --amber:#d98a00; --red:#e11d48; --blue:#2563eb;
    --shadow:0 1px 2px rgba(20,28,60,.05), 0 4px 14px rgba(20,28,60,.05);
  }
  :root[data-theme="dark"]{
    --bg:#0b0d14; --panel:#141826; --panel-2:#10131e;
    --line:#222838; --line-2:#1b2030;
    --txt:#e8ecf6; --muted:#94a0b8; --muted-2:#7c879e;
    --accent:#7c8bff; --accent-soft:#1b2138;
    --green:#34d399; --amber:#fbbf24; --red:#fb7185; --blue:#60a5fa;
    --shadow:0 1px 2px rgba(0,0,0,.3), 0 6px 18px rgba(0,0,0,.25);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:var(--bg); color:var(--txt);
    font-family:system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased; font-size:14px; line-height:1.4;
  }
  .mono{font-family:ui-monospace,'SF Mono','JetBrains Mono',Menlo,Consolas,monospace}
  .wrap{max-width:1480px;margin:0 auto;padding:22px 24px 40px}

  /* header */
  header{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:18px}
  .brand{display:flex;align-items:center;gap:11px}
  .logo{width:32px;height:32px;border-radius:9px;flex:none;display:grid;place-items:center;
    background:linear-gradient(135deg,var(--accent),#9b5bff);color:#fff;font-weight:800;font-size:15px}
  .title{font-weight:700;font-size:15px;letter-spacing:.2px}
  .title small{display:block;color:var(--muted);font-size:10.5px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;margin-top:2px}
  .task{flex:1;min-width:220px;color:var(--txt);font-weight:500}
  .task small{display:block;color:var(--muted);font-size:11px;margin-top:2px}
  .pill{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:6px 12px;border-radius:999px;
    border:1px solid var(--line);display:flex;align-items:center;gap:7px;background:var(--panel)}
  .pill .dot{width:7px;height:7px;border-radius:50%;background:var(--muted-2)}
  .pill.running{color:var(--blue);border-color:color-mix(in srgb,var(--blue) 35%,transparent);background:color-mix(in srgb,var(--blue) 8%,var(--panel))}
  .pill.running .dot{background:var(--blue);animation:pulse 1.4s ease-in-out infinite}
  .pill.complete{color:var(--green);border-color:color-mix(in srgb,var(--green) 35%,transparent)}
  .pill.complete .dot{background:var(--green)}
  .conn{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:6px}
  .conn .dot{width:7px;height:7px;border-radius:50%;background:var(--red)}
  .conn.live .dot{background:var(--green)}
  .tgl{width:34px;height:34px;border-radius:9px;border:1px solid var(--line);background:var(--panel);
    color:var(--muted);cursor:pointer;display:grid;place-items:center;font-size:15px;padding:0}
  .tgl:hover{color:var(--txt);border-color:var(--muted-2)}

  /* stats */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px;box-shadow:var(--shadow)}
  .stat .n{font-size:30px;font-weight:700;line-height:1;font-variant-numeric:tabular-nums}
  .stat .l{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-top:8px;display:flex;align-items:center;gap:6px}
  .stat .l i{width:7px;height:7px;border-radius:2px;background:currentColor;display:inline-block}
  .stat.work .n,.stat.work .l{color:var(--blue)}
  .stat.wait .n,.stat.wait .l{color:var(--amber)}
  .stat.done .n,.stat.done .l{color:var(--green)}

  /* board */
  #board{display:flex;gap:14px;overflow-x:auto;padding-bottom:10px;align-items:flex-start}
  #board.empty{display:block}
  .col{flex:0 0 264px;display:flex;flex-direction:column;gap:11px}
  .col-head{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:10px;
    border:1px solid var(--line);background:var(--panel);font-size:11.5px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
  .col-head .pdot{width:7px;height:7px;border-radius:50%;background:var(--muted-2)}
  .col-head .cnt{margin-left:auto;color:var(--muted-2);font-weight:600}
  .col-head.active{color:var(--blue);border-color:color-mix(in srgb,var(--blue) 30%,transparent)}
  .col-head.active .pdot{background:var(--blue)}
  .col-head.done{color:var(--green)}
  .col-head.done .pdot{background:var(--green)}
  .col-body{display:flex;flex-direction:column;gap:11px;min-height:8px}

  /* card */
  .card{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:12px;
    padding:13px 14px 13px 16px;box-shadow:var(--shadow);transition:border-color .2s,opacity .2s}
  .card::before{content:"";position:absolute;left:0;top:10px;bottom:10px;width:3px;border-radius:3px;background:var(--line)}
  .card.waiting{opacity:.72}
  .card.working::before{background:var(--blue)}
  .card.done::before{background:var(--green)}
  .card.blocked::before{background:var(--red)}
  .card.working{border-color:color-mix(in srgb,var(--blue) 30%,transparent)}
  .ctop{display:flex;align-items:center;gap:11px}
  .av{width:38px;height:38px;border-radius:10px;flex:none;display:grid;place-items:center;border:1px solid}
  .meta{min-width:0}
  .nm{font-weight:600;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rl{font-size:11.5px;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .badge{margin-left:auto;font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;
    padding:4px 8px;border-radius:6px;border:1px solid var(--line);color:var(--muted-2);white-space:nowrap;display:flex;align-items:center;gap:5px}
  .badge .bd{width:6px;height:6px;border-radius:50%;background:currentColor}
  .card.working .badge{color:var(--blue);border-color:color-mix(in srgb,var(--blue) 30%,transparent)}
  .card.working .badge .bd{animation:pulse 1.3s ease-in-out infinite}
  .card.done .badge{color:var(--green);border-color:color-mix(in srgb,var(--green) 30%,transparent)}
  .card.blocked .badge{color:var(--red);border-color:color-mix(in srgb,var(--red) 30%,transparent)}
  .note{font-size:11.5px;color:var(--muted);margin-top:9px;padding-top:9px;border-top:1px solid var(--line-2);word-break:break-word}
  .note:empty{display:none}
  .timer{font-size:11px;color:var(--muted);margin-top:8px;display:none}
  .timer.show{display:block}
  .timer.run{color:var(--blue)} .timer.fin{color:var(--green)}

  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  @media (prefers-reduced-motion: reduce){*{animation:none !important}}

  /* hero / idle */
  .hero{max-width:620px;margin:40px auto;text-align:center}
  .hero h1{font-size:34px;margin:0 0 8px;font-weight:800;letter-spacing:-.5px;
    background:linear-gradient(120deg,var(--accent),#9b5bff);-webkit-background-clip:text;background-clip:text;color:transparent}
  .hero p{color:var(--muted);font-size:15px;margin:0 0 22px}
  .chip{display:inline-flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--line);
    border-radius:10px;padding:10px 12px;box-shadow:var(--shadow);max-width:100%}
  .chip code{font-family:ui-monospace,Menlo,monospace;font-size:12px;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .chip button{border:0;background:var(--accent);color:#fff;border-radius:7px;padding:6px 11px;font-size:12px;font-weight:600;cursor:pointer}
  .ghost{display:flex;gap:12px;justify-content:center;margin-top:34px;opacity:.5}
  .ghost .gcol{width:120px}
  .ghost .gh{height:30px;border-radius:8px;border:1px dashed var(--line);margin-bottom:9px}
  .ghost .gc{height:48px;border-radius:9px;border:1px solid var(--line-2);background:var(--panel-2);margin-bottom:9px}

  /* activity */
  .log{margin-top:24px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px;box-shadow:var(--shadow)}
  .log h3{margin:0 0 10px;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:700}
  .feed{max-height:200px;overflow-y:auto;display:flex;flex-direction:column-reverse;gap:5px;font-family:ui-monospace,Menlo,monospace;font-size:11.5px}
  .feed .li{color:var(--txt);opacity:.9} .feed .li .t{color:var(--muted-2);margin-right:9px}

  @media (max-width:1100px){.stats{grid-template-columns:repeat(2,1fr)}}
  ::-webkit-scrollbar{height:9px;width:9px}::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="logo">P</div>
      <div class="title">Persona Team<small>Live</small></div>
    </div>
    <div class="task" id="task">Waiting for a run…<small id="runid" class="mono">idle</small></div>
    <div class="pill idle" id="pill"><span class="dot"></span><span class="t" id="pillTxt">idle</span></div>
    <div class="conn" id="conn"><span class="dot"></span><span id="connTxt" class="mono">connecting</span></div>
    <button class="tgl" id="tgl" title="Toggle light/dark" aria-label="Toggle theme">◐</button>
  </header>

  <div class="stats">
    <div class="stat"><div class="n" id="sTotal">0</div><div class="l"><i></i>Agents</div></div>
    <div class="stat work"><div class="n" id="sWork">0</div><div class="l"><i></i>Working</div></div>
    <div class="stat wait"><div class="n" id="sWait">0</div><div class="l"><i></i>Waiting</div></div>
    <div class="stat done"><div class="n" id="sDone">0</div><div class="l"><i></i>Done</div></div>
  </div>

  <div id="board"></div>

  <div class="log"><h3>Activity</h3><div class="feed" id="feed"></div></div>
</div>

<script>
"use strict";
/* ---- distinct designed avatar per persona (color + line glyph), no emoji ---- */
const AV = {
  'business-analyst': {c:'#6366f1', g:'<rect x="6" y="4" width="12" height="16" rx="2"/><path d="M9 3.5h6V6H9z"/><path d="M9 10h6M9 13.5h4"/>'},
  'product-owner':    {c:'#0d9488', g:'<circle cx="12" cy="12" r="8"/><path d="M15 9l-2.4 5.4L7 17l2.6-5.6z"/>'},
  'software-architect':{c:'#2563eb', g:'<path d="M3 9l9-5 9 5"/><path d="M6 9.5v8M10 9.5v8M14 9.5v8M18 9.5v8"/><path d="M4 20.5h16"/>'},
  'team-lead':        {c:'#d97706', g:'<circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="4"/><circle cx="12" cy="12" r="1.1"/>'},
  'backend-senior':   {c:'#0891b2', g:'<rect x="3.5" y="5" width="17" height="6" rx="1.6"/><rect x="3.5" y="13" width="17" height="6" rx="1.6"/><path d="M7 8h.01M7 16h.01"/>'},
  'frontend-senior':  {c:'#db2777', g:'<rect x="3.5" y="5" width="17" height="14" rx="2"/><path d="M3.5 9h17"/><path d="M7 13h5"/>'},
  'fullstack-senior': {c:'#7c3aed', g:'<path d="M12 3.5l8.5 4.5-8.5 4.5L3.5 8z"/><path d="M3.5 12.5l8.5 4.5 8.5-4.5"/>'},
  'devops-engineer':  {c:'#16a34a', g:'<path d="M12 3c2.8 1.8 4 5.2 4 8.5L12 15l-4-3.5C8 8.2 9.2 4.8 12 3z"/><circle cx="12" cy="9" r="1.6"/><path d="M8 15.5l-2.5 4M16 15.5l2.5 4"/>'},
  'qa-test-senior':   {c:'#dc2626', g:'<circle cx="10.5" cy="10.5" r="6"/><path d="M15 15l5 5"/><path d="M8 10.5l2 2 3.5-3.5"/>'},
  'senior-recruiter': {c:'#ea580c', g:'<circle cx="12" cy="8" r="3.6"/><path d="M5.5 20c0-3.8 3-6 6.5-6s6.5 2.2 6.5 6"/>'}
};
function avatarSVG(id){
  const a = AV[id] || {c:'#8a92a6', g:'<circle cx="12" cy="12" r="7"/><path d="M9 12h6"/>'};
  return '<svg viewBox="0 0 24 24" width="21" height="21" fill="none" stroke="'+a.c+'" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">'+a.g+'</svg>';
}
const COLOROF = id => (AV[id]||{c:'#8a92a6'}).c;
const BADGE = {waiting:'queued',working:'working',done:'done',blocked:'blocked'};

/* ---- helpers ---- */
const $ = id => document.getElementById(id);
function fmt(ms){ if(ms<0)ms=0; const s=Math.floor(ms/1000),m=Math.floor(s/60); return (m?m+'m ':'')+(s%60)+'s'; }
function dur(a){ if(!a.startedAt) return ''; const end=a.endedAt?Date.parse(a.endedAt):Date.now(); return fmt(end-Date.parse(a.startedAt)); }
function colName(a){ return a.phase || 'Team'; }
function setText(el,v){ if(el.textContent!==String(v)) el.textContent=v; }

/* ---- keyed reconciler: build once, update in place ---- */
let S=null;
const board=$('board');
const colEls=new Map();   // name -> {wrap,head,pdot,cnt,body}
const cardEls=new Map();  // id -> {root,nm,rl,badge,bdot,note,timer,status}

function makeCol(name){
  const wrap=document.createElement('div'); wrap.className='col';
  const head=document.createElement('div'); head.className='col-head';
  const pdot=document.createElement('span'); pdot.className='pdot';
  const ttl=document.createElement('span'); ttl.textContent=name;
  const cnt=document.createElement('span'); cnt.className='cnt'; cnt.textContent='0';
  head.append(pdot,ttl,cnt);
  const body=document.createElement('div'); body.className='col-body';
  wrap.append(head,body);
  return {wrap,head,pdot,cnt,body};
}
function makeCard(a){
  const root=document.createElement('div'); root.className='card '+a.status;
  const top=document.createElement('div'); top.className='ctop';
  const av=document.createElement('div'); av.className='av'; av.innerHTML=avatarSVG(a.id);
  const col=COLOROF(a.id); av.style.background='color-mix(in srgb,'+col+' 12%,transparent)'; av.style.borderColor='color-mix(in srgb,'+col+' 35%,transparent)';
  const meta=document.createElement('div'); meta.className='meta';
  const nm=document.createElement('div'); nm.className='nm'; nm.textContent=a.id;
  const rl=document.createElement('div'); rl.className='rl';
  meta.append(nm,rl);
  const badge=document.createElement('span'); badge.className='badge';
  const bdot=document.createElement('span'); bdot.className='bd'; const bt=document.createElement('span');
  badge.append(bdot,bt);
  top.append(av,meta,badge);
  const note=document.createElement('div'); note.className='note';
  const timer=document.createElement('div'); timer.className='timer';
  root.append(top,note,timer);
  return {root,nm,rl,badge:bt,note,timer,status:null};
}
function updateCard(c,a){
  if(c.status!==a.status){ c.root.className='card '+a.status; c.status=a.status; setText(c.badge,BADGE[a.status]||a.status); }
  setText(c.rl,a.role||'');
  setText(c.note,a.note||'');
  if(a.startedAt){
    c.timer.dataset.start=a.startedAt; c.timer.dataset.end=a.endedAt||'';
    c.timer.className='timer show '+(a.endedAt?'fin':'run');
    c.timer.textContent=(a.endedAt?'✓ ':'')+dur(a);
  } else { c.timer.className='timer'; c.timer.textContent=''; }
}

function heroHTML(){
  const cols=['Analyze','Design','Implement','Test','Deliver'];
  const ghost=cols.map(()=>'<div class="gcol"><div class="gh"></div><div class="gc"></div><div class="gc"></div></div>').join('');
  return '<div class="hero"><h1>Persona Team</h1><p>Spin up a senior team. Watch them ship — live.</p>'+
    '<div class="chip"><code>/build-team &lt;your task&gt;</code><button onclick="navigator.clipboard&amp;&amp;navigator.clipboard.writeText(\'/build-team \')">Copy</button></div>'+
    '<div class="ghost">'+ghost+'</div></div>';
}

function render(){
  if(!S) return;
  setText($('task').childNodes[0],S.task||'Waiting for a run…');
  setText($('runid'),S.runId?('run '+String(S.runId).slice(-6)):'idle');
  const pill=$('pill'); pill.className='pill '+(S.status||'idle'); setText($('pillTxt'),S.status||'idle');

  const agents=S.order.map(id=>S.agents[id]).filter(Boolean);
  let w=0,wa=0,d=0;
  for(const a of agents){ if(a.status==='working')w++; else if(a.status==='done')d++; else if(a.status!=='blocked')wa++; }
  setText($('sTotal'),agents.length); setText($('sWork'),w); setText($('sWait'),wa); setText($('sDone'),d);

  if(!agents.length){
    if(!board.classList.contains('empty')){ board.className='empty'; board.innerHTML=heroHTML(); colEls.clear(); cardEls.clear(); }
    renderFeed(); return;
  }
  if(board.classList.contains('empty')){ board.className=''; board.innerHTML=''; }

  // ordered columns: declared phases, then any agent-only phases
  const order=[]; (S.phases||[]).forEach(p=>order.push(p.name));
  for(const a of agents){ const n=colName(a); if(order.indexOf(n)<0) order.push(n); }
  if(!order.length) order.push('Team');
  const pst={}; (S.phases||[]).forEach(p=>pst[p.name]=p.status);

  order.forEach(name=>{
    let c=colEls.get(name); if(!c){ c=makeCol(name); colEls.set(name,c); }
    board.appendChild(c.wrap);                       // move into order (cheap, keeps node)
    const st=pst[name]; c.head.className='col-head '+(st==='active'?'active':st==='done'?'done':'');
    setText(c.cnt, agents.filter(a=>colName(a)===name).length);
  });
  for(const [name,c] of colEls){ if(order.indexOf(name)<0){ c.wrap.remove(); colEls.delete(name); } }

  for(const a of agents){
    let c=cardEls.get(a.id); if(!c){ c=makeCard(a); cardEls.set(a.id,c); }
    updateCard(c,a);
    const col=colEls.get(colName(a)); if(col) col.body.appendChild(c.root);  // place/move in order
  }
  for(const [id,c] of cardEls){ if(!S.agents[id]){ c.root.remove(); cardEls.delete(id); } }

  renderFeed();
}
let lastFeedLen=-1;
function renderFeed(){
  const logs=S.logs||[];
  if(logs.length===lastFeedLen) return; lastFeedLen=logs.length;
  const feed=$('feed');
  feed.innerHTML=logs.slice(-70).map(l=>'<div class="li"><span class="t">'+(l.ts||'').slice(11,19)+'</span>'+esc(l.message)+'</div>').join('');
}
function esc(s){ return (s==null?'':String(s)).replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

/* update only running timers, 1s — cheap, no rAF */
setInterval(()=>{
  document.querySelectorAll('.timer.run').forEach(t=>{ if(!t.dataset.end) t.textContent=fmt(Date.now()-Date.parse(t.dataset.start)); });
},1000);

/* theme toggle */
$('tgl').onclick=()=>{ const r=document.documentElement; const n=r.getAttribute('data-theme')==='dark'?'light':'dark'; r.setAttribute('data-theme',n); try{localStorage.setItem('pt-theme',n)}catch(e){} };

/* SSE */
function connect(){
  const es=new EventSource('/events');
  const conn=$('conn');
  es.onopen=()=>{ conn.className='conn live'; setText($('connTxt'),'live'); };
  es.onmessage=e=>{ try{ const m=JSON.parse(e.data); if(m.kind==='snapshot'){ S=m.state; render(); } }catch(_){} };
  es.onerror=()=>{ conn.className='conn'; setText($('connTxt'),'reconnecting'); es.close(); setTimeout(connect,1500); };
}
connect();
</script>
</body>
</html>
